<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Canvas — terminals</title>
  <!-- canvas.html lives under app/, so the dashboard styles/ dir is one level
       up. styles.css was split into flat partials (refactor #4); load them in
       the EXACT original cascade order to preserve appearance. -->
  <link rel="stylesheet" href="../styles/tokens.css" />
  <link rel="stylesheet" href="../styles/base.css" />
  <link rel="stylesheet" href="../styles/layout.css" />
  <link rel="stylesheet" href="../styles/components.css" />
  <link rel="stylesheet" href="../styles/terminals.css" />
  <link rel="stylesheet" href="../styles/toolbar.css" />
  <link rel="stylesheet" href="../styles/skills.css" />

  <link rel="stylesheet" href="../styles/pipelines.css" />

  <!-- CDN libs PaneCore's render engine depends on (same versions/integrity as
       index.html). marked + DOMPurify render assistant markdown into chat /
       session panes; xterm + addons drive kind=terminal (PTY) panes. They MUST
       load before pane-core.js so the engine resolves them as globals. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css" integrity="sha384-9ftsg11+LSxVUaknegCfeKvlkO9EdIPI2op725RqY87IvhyGjElmpjZlP3LhTQjn" crossorigin="anonymous" />
  <script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js" integrity="sha384-NNQgBjjuhtXzPmmy4gurS5X7P4uTt1DThyevz4Ua0IVK5+kazYQI1W27JHjbbxQz" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js" integrity="sha384-xjfWUeCWdMtvpAb/SmM6lMzS6pQGcQa0loOl1d97j6Odw0vjK9nW3+dTb/bn/mwH" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js" integrity="sha384-dpjGwSSISUTz2taP54Bor7qkyMR20sSO9oe11UVYnGs2/YdUBf7HW30XKQx9PCzn" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.9.0/lib/xterm-addon-web-links.min.js" integrity="sha384-iAAiqSZrWZz/YKZSTKOPNaRhVOg9JY14avg2EWEpYNnUsrnATA+Sg8pV7mak84/G" crossorigin="anonymous"></script>
</head>
<body>
  <div id="canvas-root"></div>

  <!-- Sibling-relative script srcs (this page is already inside app/).
       Dependency order: shared engine (core/skills) → pure pane render
       leaves (pane-helpers) → PaneCore → canvas engine (split-tree,
       canvas-bus) → boot file. -->
  <script defer src="./core.js"></script>
  <script defer src="./skills.js"></script>
  <script defer src="./pane-helpers.js"></script>
  <script defer src="./pane-core.js"></script>
  <script defer src="./split-tree.js"></script>
  <script defer src="./canvas-bus.js"></script>
  <script defer src="./canvas.js"></script>
</body>
</html>
