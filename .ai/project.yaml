boundaries:
  risky_areas: []
  do_not_touch: []
  generated_files:
    # .agents/skills/<name>/ (except the bridge claude/) is regenerated from
    # .claude/skills/ by .ai/scripts/sync_skills.py and the installers' mirror
    # loop — not versioned. The bridge .agents/skills/claude/ has no
    # .claude/skills/ source and stays tracked.
    - .agents/skills
    - .ai/local/jobs
    - .ai/local/ledgers/jobs.jsonl
    - .ai/local/ledgers/improvements.jsonl
    - .ai/local/ledgers/events.jsonl
    - .ai/local/ledgers/metrics.jsonl
    - .ai/local/ledgers/skill_metrics.jsonl
    - .ai/local/ledgers/todos.jsonl
    - .ai/local/ledgers/todos-archive.jsonl
    - .ai/local/agent-runs
    - .ai/local/pipelines
    - .ai/TODO.md
    - .ai/.todos.lock
    - .ai/local/.todos-parser.log
  migration_sensitive: []
  security_sensitive:
    - .ai/dashboard/serve.py

conventions:
  naming: []
  architecture: []
  testing: []
  dependency_policy: []
  branching_notes: []

subdirectory_agents: []

definition_of_done:
  - scope is respected
  - validation has run or is explicitly impossible
  - no unrelated files changed
  - handoff section is filled
  - assumptions are listed
  - risks are listed

assumptions: []
unknowns: []

memory_tuning:
  consolidation_threshold_lines: 150  # current trigger for memory.md consolidation
  floor: 50                            # never go below this
  ceiling: 300                         # never go above this
  last_ratios: []                      # last 3 compaction ratios (lines_before / lines_after); newest first
  last_consolidated_at: ""             # YYYY-MM-DD of last consolidation pass
