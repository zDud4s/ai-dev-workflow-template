# AI workflow model configuration
# tool: claude | codex
# Available models (refreshed May 2026):
#   Claude: claude-opus-4-7, claude-opus-4-6, claude-sonnet-4-6, claude-haiku-4-5
#           docs: https://platform.claude.com/docs/en/about-claude/models/overview
#   Codex:  gpt-5.5, gpt-5.4, gpt-5.4-mini, gpt-5.3-codex
#           docs: https://developers.openai.com/codex/models
#
# Optional per-phase fields:
#   mode: inline | agent | dispatcher   # override auto-routing for that phase
#   timeout_seconds: <int>              # subprocess wall-clock timeout (see .ai/workflow/dispatch.md)
#   reasoning_effort: xhigh|high|medium|low   # codex only; default medium when absent
# Default timeouts: 1800 for execute; 600 for plan/review/rescue/maintenance/bootstrap.

dispatch_mode: auto    # auto | manual

session:
  tool: claude
  model: claude-sonnet-4-6

plan:
  tool: claude
  model: claude-sonnet-4-6

execute:
  tool: codex
  model: gpt-5.3-codex
  # timeout_seconds: 1800

review:
  tool: claude
  model: claude-opus-4-6

rescue:
  tool: claude
  model: claude-opus-4-6

maintenance:
  tool: claude
  model: claude-sonnet-4-6

bootstrap:
  tool: claude
  model: claude-sonnet-4-6
