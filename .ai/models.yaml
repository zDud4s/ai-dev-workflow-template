# AI workflow model configuration
# tool: claude | codex
#
# ── SINGLE SOURCE OF TRUTH FOR THE MODEL CATALOG ──────────────────────────
# The `catalog:` block below is the ONLY place to add or remove a model.
# It feeds every model picker in the dashboard (served via /api/settings to
# core.js / terminals.js) and the Python job-spawn fallbacks. When a new
# model ships, add one line here — nothing else needs touching.
# Newest-first within each tool; the first entry per tool is its default.
#   Claude docs: https://platform.claude.com/docs/en/about-claude/models/overview
#   Codex  docs: https://developers.openai.com/codex/models
#
catalog:
  claude:
    - id: claude-opus-4-8     # default — most capable Opus-tier, 1M ctx, $5/$25
    - id: claude-fable-5      # frontier (GA 2026-06-09), 1M ctx, $10/$50
    - id: claude-opus-4-7     # legacy Opus, 1M ctx
    - id: claude-sonnet-4-6   # balanced speed/intelligence, 1M ctx
    - id: claude-haiku-4-5    # fastest / cheapest, 200k ctx
  codex:
    - id: gpt-5.5             # current frontier (recommended)
    - id: gpt-5.4             # flagship frontier
    - id: gpt-5.4-mini        # fast subagent

council:
  timeout_seconds: 600          # per-seat subprocess wall-clock timeout
  chairman: { type: model, ref: claude-opus-4-8 }
  members:
    - { type: model, ref: claude-opus-4-8 }
    - { type: model, ref: gpt-5.5 }
    - { type: model, ref: claude-sonnet-4-6 }
    # Agent seats (opt-in; require an existing .claude/agents/<ref>.md and a claude model):
    # - { type: agent, ref: security-reviewer,    model: claude-opus-4-8 }
    # - { type: agent, ref: marketing-strategist, model: claude-opus-4-8 }
#
# Optional per-phase fields:
#   mode: inline | agent | dispatcher   # override auto-routing for that phase
#   timeout_seconds: <int>              # subprocess wall-clock timeout (see .ai/workflow/dispatch.md)
#   reasoning_effort: xhigh|high|medium|low   # codex only; default medium when absent
# Default timeouts: 1800 for execute; 600 for plan/review/rescue/maintenance/bootstrap.

auto_select:
  enabled: true                  # false = current behaviour; true = planner picks
  token_budget: high              # low | medium | high
  phases: [execute, review, rescue]
  # scope: project                # null/absent = all phases; else list of phase names to apply auto-selection to
  adaptive: false                 # When true, planner scores against .ai/ledgers/metrics.jsonl

dispatch_mode: auto    # auto | manual

session:
  tool: claude
  model: claude-opus-4-8

plan:
  tool: claude
  model: claude-opus-4-8

execute:
  tool: codex
  model: gpt-5.5

review:
  tool: claude
  model: claude-opus-4-8

rescue:
  tool: claude
  model: claude-opus-4-7

maintenance:
  tool: claude
  model: claude-sonnet-4-6

bootstrap:
  tool: claude
  model: claude-sonnet-4-6

run_pipeline:
  synthesize:
    tool: claude
    model: claude-sonnet-4-6
    skill: synthesizer
    reasoning_effort: medium
    timeout_seconds: 600
  maintenance:
    tool: claude
    model: claude-sonnet-4-6
  codex_dispatch:
    model: gpt-5.5
    reasoning_effort: medium
    timeout_seconds: 1800
