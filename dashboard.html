<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Workflow Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wdth,wght@12..96,75..125,300..800&family=Departure+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;

      --ff-display: "Bricolage Grotesque", ui-sans-serif, system-ui, sans-serif;
      --ff-body:    "Bricolage Grotesque", ui-sans-serif, system-ui, sans-serif;
      --ff-mono:    "Departure Mono", "JetBrains Mono", ui-monospace, Menlo, Consolas, monospace;
      --mono: var(--ff-mono);

      --bg:        oklch(13.5% 0.006 65);
      --panel:     oklch(17%   0.009 60);
      --panel-2:   oklch(21%   0.011 55);
      --inset:     oklch(10%   0.005 65);
      --tinted:    oklch(16%   0.018 55);

      --border:        oklch(28% 0.012 55);
      --border-soft:   oklch(23% 0.010 60);

      --text:    oklch(95% 0.010 70);
      --text-2:  oklch(80% 0.014 65);
      --muted:   oklch(60% 0.018 60);
      --faint:   oklch(45% 0.016 55);
      --on-accent: oklch(15% 0.020 60);

      --accent:      oklch(76% 0.135 55);     /* warm copper */
      --accent-hi:   oklch(85% 0.115 60);
      --accent-soft: oklch(28% 0.050 55);
      --accent-bg:   oklch(23% 0.045 55);

      --accent-2:    oklch(74% 0.085 200);    /* dusty teal */
      --teal-bg:     oklch(24% 0.035 200);

      --ok:   oklch(76% 0.135 150);
      --ok-bg: oklch(24% 0.050 150);
      --warn: oklch(80% 0.125 85);
      --bad:  oklch(70% 0.165 25);
      --bad-bg: oklch(24% 0.060 25);

      --s-1: 4px;  --s-2: 8px;  --s-3: 12px;
      --s-4: 16px; --s-5: 24px; --s-6: 32px;
      --s-7: 48px; --s-8: 64px;
      --r-sm: 4px; --r-md: 8px;
      --easing: cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg:       oklch(97%  0.006 75);
        --panel:    oklch(99%  0.004 70);
        --panel-2:  oklch(95%  0.008 70);
        --inset:    oklch(98%  0.003 70);
        --tinted:   oklch(95%  0.020 55);
        --border:        oklch(88% 0.010 65);
        --border-soft:   oklch(92% 0.008 65);
        --text:    oklch(20% 0.015 60);
        --text-2:  oklch(35% 0.014 60);
        --muted:   oklch(50% 0.018 60);
        --faint:   oklch(65% 0.014 55);
        --on-accent: oklch(98% 0.010 70);
        --accent:      oklch(55% 0.165 55);
        --accent-hi:   oklch(48% 0.180 55);
        --accent-soft: oklch(88% 0.040 55);
        --accent-bg:   oklch(94% 0.030 55);
        --accent-2:    oklch(50% 0.110 200);
        --teal-bg:     oklch(94% 0.020 200);
        --ok:    oklch(50% 0.140 150);
        --ok-bg: oklch(94% 0.040 150);
        --bad:   oklch(55% 0.180 25);
        --bad-bg: oklch(96% 0.030 25);
      }
    }

    * { box-sizing: border-box; }
    ::selection { background: var(--accent-soft); color: var(--text); }

    body {
      margin: 0;
      font-family: var(--ff-body);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .layout {
      display: grid;
      grid-template-columns: 264px 1fr;
      min-height: 100vh;
    }

    /* ---------------- Sidebar ---------------- */
    aside {
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: var(--s-5) var(--s-3);
      position: sticky;
      top: 0;
      max-height: 100vh;
      overflow-y: auto;
    }
    aside h1 {
      font-family: var(--ff-mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 var(--s-2) var(--s-3);
      font-weight: 400;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    aside h1::before {
      content: "\25AE";
      color: var(--accent);
    }
    .project-title {
      font-family: var(--ff-display);
      font-size: 22px;
      font-weight: 600;
      margin: 0 var(--s-2) 2px;
      word-break: break-word;
      letter-spacing: -0.015em;
      color: var(--text);
      font-variation-settings: "wdth" 102;
      line-height: 1.15;
    }
    .project-sub {
      font-size: 11px;
      color: var(--faint);
      margin: 0 var(--s-2) var(--s-6);
      font-family: var(--ff-mono);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    nav ul { list-style: none; padding: 0; margin: 0; }
    nav a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      color: var(--text-2);
      text-decoration: none;
      border-radius: var(--r-sm);
      cursor: pointer;
      font-size: 13px;
      margin-bottom: 1px;
      transition: background 120ms var(--easing), color 120ms var(--easing);
    }
    nav a:hover { background: var(--panel-2); color: var(--text); }
    nav a.active {
      background: var(--panel-2);
      color: var(--accent);
      font-weight: 500;
    }
    nav .count {
      font-family: var(--ff-mono);
      font-size: 10px;
      color: var(--faint);
      letter-spacing: 0.05em;
      padding: 1px 6px;
    }
    nav a.active .count { color: var(--accent); }

    /* ---------------- Main ---------------- */
    main {
      padding: var(--s-6) clamp(var(--s-5), 4vw, var(--s-7)) var(--s-8);
      max-width: 1200px;
      overflow-x: auto;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: var(--s-5);
      padding-bottom: var(--s-3);
      gap: var(--s-4);
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border-soft);
    }
    .panel-header h2 {
      margin: 0;
      font-family: var(--ff-display);
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.02em;
      font-variation-settings: "wdth" 100;
      color: var(--text);
    }
    .panel-header .actions { display: flex; gap: var(--s-3); align-items: center; }
    .panel-header .meta {
      font-size: 10px;
      color: var(--faint);
      font-family: var(--ff-mono);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* ---------------- Cards ---------------- */
    .card {
      background: var(--panel);
      border: 1px solid var(--border-soft);
      border-radius: var(--r-md);
      padding: var(--s-5);
      margin-bottom: var(--s-4);
      transition: border-color 140ms var(--easing);
    }
    .card:hover { border-color: var(--border); }
    .card h3 {
      margin: 0 0 var(--s-4);
      font-family: var(--ff-mono);
      font-size: 10px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--faint);
    }
    .kv {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 8px var(--s-4);
      font-size: 13px;
      margin: 0;
    }
    .kv dt {
      color: var(--muted);
      font-family: var(--ff-mono);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .kv dd {
      margin: 0;
      font-family: var(--ff-mono);
      word-break: break-word;
      color: var(--text-2);
    }

    /* ---------------- Phase grid ---------------- */
    .phase-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: var(--s-3);
    }
    .phase {
      background: var(--panel-2);
      border: 1px solid var(--border-soft);
      border-radius: var(--r-sm);
      padding: var(--s-3) var(--s-4);
      transition: border-color 140ms var(--easing);
    }
    .phase:hover { border-color: var(--border); }
    .phase .name {
      font-family: var(--ff-mono);
      font-weight: 400;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--accent);
      margin-bottom: var(--s-2);
    }
    .phase .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-family: var(--ff-mono);
      margin-top: 4px;
      color: var(--text-2);
    }
    .phase .row span:first-child {
      color: var(--faint);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    /* ---------------- Markdown ---------------- */
    .markdown { font-size: 14px; line-height: 1.65; color: var(--text-2); }
    .markdown > :first-child { margin-top: 0; }
    .markdown h1, .markdown h2, .markdown h3, .markdown h4 {
      color: var(--text);
      font-family: var(--ff-display);
      font-weight: 600;
      letter-spacing: -0.01em;
    }
    .markdown h1 { font-size: 22px; margin-top: 1.6em; }
    .markdown h2 {
      font-size: 18px;
      margin-top: 1.5em;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border-soft);
    }
    .markdown h3 { margin-top: 1.3em; font-size: 15px; color: var(--accent); }
    .markdown h4 {
      font-family: var(--ff-mono);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-weight: 400;
    }
    .markdown p { max-width: 72ch; }
    .markdown code {
      font-family: var(--ff-mono);
      background: var(--inset);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 0.86em;
      color: var(--accent-hi);
      border: 1px solid var(--border-soft);
    }
    .markdown pre {
      background: var(--inset);
      border: 1px solid var(--border-soft);
      border-radius: var(--r-sm);
      padding: var(--s-4) var(--s-5);
      overflow-x: auto;
      font-size: 12.5px;
      margin: var(--s-3) 0;
    }
    .markdown pre code {
      background: transparent;
      border: 0;
      padding: 0;
      font-size: inherit;
      color: var(--text);
    }
    .markdown ul, .markdown ol { padding-left: 24px; }
    .markdown a {
      color: var(--accent);
      text-decoration: underline;
      text-decoration-color: var(--accent-soft);
      text-underline-offset: 3px;
    }
    .markdown a:hover { text-decoration-color: var(--accent); }
    .markdown table { border-collapse: collapse; margin: var(--s-3) 0; }
    .markdown th, .markdown td {
      border: 1px solid var(--border-soft);
      padding: 8px 12px;
      text-align: left;
      font-size: 13px;
    }
    .markdown th {
      background: var(--panel-2);
      font-family: var(--ff-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      font-weight: 500;
    }
    .markdown blockquote {
      margin: var(--s-4) 0;
      padding: var(--s-3) var(--s-5) var(--s-3) var(--s-6);
      background: var(--tinted);
      border-radius: var(--r-sm);
      color: var(--text-2);
      position: relative;
      font-style: italic;
    }
    .markdown blockquote::before {
      content: "\201C";
      position: absolute;
      left: 12px;
      top: 0;
      font-family: var(--ff-display);
      font-size: 32px;
      line-height: 1.1;
      color: var(--accent);
      font-style: normal;
    }
    .markdown blockquote p { margin: 0; }
    .markdown li input[type=checkbox] { margin-right: 6px; accent-color: var(--accent); }
    .markdown li:has(> input[type=checkbox]:checked) {
      color: var(--faint);
      text-decoration: line-through;
      text-decoration-color: var(--faint);
    }

    /* ---------------- Progress ---------------- */
    .progress {
      background: var(--inset);
      height: 4px;
      border-radius: 2px;
      overflow: hidden;
      margin: var(--s-2) 0;
    }
    .progress-bar {
      background: var(--accent);
      height: 100%;
      transition: width 0.4s var(--easing);
    }

    /* ---------------- File list ---------------- */
    .file-list { list-style: none; padding: 0; margin: 0; }
    .file-list li {
      padding: var(--s-4) 0;
      border-bottom: 1px solid var(--border-soft);
    }
    .file-list li:last-child { border-bottom: 0; }
    .file-list .name {
      font-family: var(--ff-display);
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .file-list .stats {
      font-size: 10px;
      color: var(--faint);
      font-family: var(--ff-mono);
      margin-top: 5px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .file-list details { margin-top: var(--s-2); }
    .file-list summary {
      cursor: pointer;
      color: var(--accent);
      font-size: 11px;
      font-family: var(--ff-mono);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 4px 0;
      list-style: none;
    }
    .file-list summary::before { content: "\25B8  "; }
    .file-list details[open] summary::before { content: "\25BE  "; }

    /* ---------------- Badges ---------------- */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 2px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-family: var(--ff-mono);
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
    .badge::before {
      content: "";
      width: 5px; height: 5px;
      border-radius: 50%;
      background: currentColor;
      opacity: 0.9;
    }
    .badge-tool-claude     { background: var(--accent-bg); color: var(--accent); }
    .badge-tool-codex      { background: var(--teal-bg);   color: var(--accent-2); }
    .badge-mode-inline     { background: var(--ok-bg);     color: var(--ok); }
    .badge-mode-agent      { background: var(--accent-bg); color: var(--accent); }
    .badge-mode-dispatcher { background: var(--bad-bg);    color: var(--bad); }
    .badge-auto            { background: var(--ok-bg);     color: var(--ok); }
    .badge-manual          { background: var(--panel-2);   color: var(--muted); border: 1px solid var(--border-soft); }

    /* ---------------- Refresh button ---------------- */
    button.refresh {
      background: var(--panel);
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: var(--r-sm);
      font-size: 10px;
      cursor: pointer;
      font-family: var(--ff-mono);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: border-color 120ms var(--easing), color 120ms var(--easing);
    }
    button.refresh:hover { border-color: var(--accent); color: var(--accent); }

    /* ---------------- Empty ---------------- */
    .empty {
      text-align: center;
      color: var(--muted);
      padding: var(--s-7) var(--s-4);
      font-size: 13px;
    }
    .empty::before {
      content: "\2014  no data  \2014";
      display: block;
      font-family: var(--ff-mono);
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--faint);
      margin-bottom: var(--s-3);
    }

    /* ---------------- Panels & errors ---------------- */
    .panel { display: none; }
    .panel.active { display: block; animation: fadeIn 220ms var(--easing); }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(3px); }
      to   { opacity: 1; transform: none; }
    }
    .error-box {
      background: var(--bad-bg);
      border: 1px solid var(--bad);
      color: var(--bad);
      padding: var(--s-4) var(--s-5);
      border-radius: var(--r-md);
      font-size: 13px;
      margin-bottom: var(--s-4);
      line-height: 1.7;
    }
    .error-box code {
      font-family: var(--ff-mono);
      background: rgb(0 0 0 / 0.18);
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 0.92em;
    }

    /* ---------------- Scrollbars ---------------- */
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-track { background: transparent; }
    *::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 5px;
      border: 2px solid var(--bg);
    }
    *::-webkit-scrollbar-thumb:hover { background: var(--accent-soft); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    @media (max-width: 880px) {
      .layout { grid-template-columns: 1fr; }
      aside { position: static; max-height: none; border-right: 0; border-bottom: 1px solid var(--border); }
      main { padding: var(--s-4); }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside>
      <h1>AI Workflow</h1>
      <div class="project-title" id="proj-name">loading…</div>
      <div class="project-sub" id="proj-type">—</div>
      <nav>
        <ul>
          <li><a data-tab="overview" class="active">Overview <span class="count"></span></a></li>
          <li><a data-tab="models">Models <span class="count" id="c-models">—</span></a></li>
          <li><a data-tab="plans">Plans <span class="count" id="c-plans">—</span></a></li>
          <li><a data-tab="specs">Specs <span class="count" id="c-specs">—</span></a></li>
          <li><a data-tab="memory">Memory <span class="count" id="c-memory">—</span></a></li>
          <li><a data-tab="decisions">Decisions <span class="count" id="c-decisions">—</span></a></li>
          <li><a data-tab="packets">Packets <span class="count" id="c-packets">—</span></a></li>
        </ul>
      </nav>
    </aside>
    <main>
      <div class="panel-header">
        <h2 id="panel-title">Overview</h2>
        <div class="actions">
          <span class="meta" id="updated">—</span>
          <button class="refresh" onclick="loadAll()">Refresh</button>
        </div>
      </div>

      <section class="panel active" id="p-overview"></section>
      <section class="panel" id="p-models"></section>
      <section class="panel" id="p-plans"></section>
      <section class="panel" id="p-specs"></section>
      <section class="panel" id="p-memory"></section>
      <section class="panel" id="p-decisions"></section>
      <section class="panel" id="p-packets"></section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/js-yaml@4/dist/js-yaml.min.js"></script>
  <script>
    const state = {
      project: null, models: null,
      memory: '', decisions: '',
      plans: [], specs: [], packets: [],
    };

    async function fetchText(path) {
      const r = await fetch(path, { cache: 'no-store' });
      if (!r.ok) throw new Error(`${path} → HTTP ${r.status}`);
      return r.text();
    }

    // Parse directory listing returned by python -m http.server.
    async function listDir(path) {
      try {
        const html = await fetchText(path);
        const doc = new DOMParser().parseFromString(html, 'text/html');
        return [...doc.querySelectorAll('a')]
          .map(a => a.getAttribute('href'))
          .filter(h => h && h.endsWith('.md'))
          .map(h => decodeURIComponent(h.split('/').pop()))
          .sort();
      } catch (e) {
        return [];
      }
    }

    function setActive(tab) {
      document.querySelectorAll('nav a').forEach(a =>
        a.classList.toggle('active', a.dataset.tab === tab)
      );
      document.querySelectorAll('.panel').forEach(p =>
        p.classList.toggle('active', p.id === 'p-' + tab)
      );
      const titles = { overview: 'Overview', models: 'Models', plans: 'Plans',
        specs: 'Specs', memory: 'Memory', decisions: 'Decisions', packets: 'Packets' };
      document.getElementById('panel-title').textContent = titles[tab] || tab;
    }

    document.querySelectorAll('nav a').forEach(a =>
      a.addEventListener('click', () => setActive(a.dataset.tab))
    );

    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, c =>
        ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])
      );
    }

    function parseCheckboxes(md) {
      let total = 0, done = 0;
      for (const l of md.split(/\r?\n/)) {
        if (/^\s*[-*]\s+\[\s\]/.test(l)) total++;
        else if (/^\s*[-*]\s+\[x\]/i.test(l)) { total++; done++; }
      }
      return { total, done };
    }

    function firstHeading(md) {
      const m = md.match(/^#\s+(.+?)\s*$/m);
      return m ? m[1] : null;
    }

    function countMemoryEntries(md) {
      if (!md) return 0;
      const after = md.split(/##\s*Entries/i)[1] || '';
      return (after.match(/^- /gm) || []).length;
    }

    function renderOverview() {
      const p = state.project || {};
      const m = state.models || {};
      const phaseList = ['plan','execute','review','rescue','maintenance','bootstrap'];

      const cards = [];
      cards.push(`
        <div class="card">
          <h3>Project</h3>
          <dl class="kv">
            <dt>Name</dt><dd>${escapeHtml(p.project_name || 'unknown')}</dd>
            <dt>Type</dt><dd>${escapeHtml(p.project_type || 'unknown')}</dd>
            <dt>Stack</dt><dd>${escapeHtml((p.stack||[]).join(', ') || '—')}</dd>
            <dt>Package mgrs</dt><dd>${escapeHtml((p.package_managers||[]).join(', ') || '—')}</dd>
            <dt>Entrypoints</dt><dd>${escapeHtml((p.entrypoints||[]).join(', ') || '—')}</dd>
          </dl>
        </div>
      `);

      const sessionStr = m.session ? `${m.session.tool} / ${m.session.model}` : '—';
      const modeBadge = m.dispatch_mode === 'auto'
        ? '<span class="badge badge-auto">auto</span>'
        : `<span class="badge badge-manual">${escapeHtml(m.dispatch_mode || 'manual')}</span>`;
      cards.push(`
        <div class="card">
          <h3>Dispatch</h3>
          <dl class="kv">
            <dt>Mode</dt><dd>${modeBadge}</dd>
            <dt>Session</dt><dd>${escapeHtml(sessionStr)}</dd>
          </dl>
          <div style="margin-top:16px" class="phase-grid">
            ${phaseList.filter(k => m[k]).map(k => {
              const cfg = m[k];
              return `
                <div class="phase">
                  <div class="name">${k}</div>
                  <div class="row"><span>tool</span><span><span class="badge badge-tool-${escapeHtml(cfg.tool)}">${escapeHtml(cfg.tool)}</span></span></div>
                  <div class="row"><span>model</span><span>${escapeHtml(cfg.model)}</span></div>
                  ${cfg.mode ? `<div class="row"><span>mode</span><span><span class="badge badge-mode-${escapeHtml(cfg.mode)}">${escapeHtml(cfg.mode)}</span></span></div>` : ''}
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `);

      if (p.commands) {
        const rows = Object.entries(p.commands)
          .filter(([k,v]) => v && (Array.isArray(v) ? v.length : true))
          .map(([k,v]) => `<dt>${escapeHtml(k)}</dt><dd>${escapeHtml(Array.isArray(v) ? v.join(' && ') : v)}</dd>`)
          .join('');
        if (rows) {
          cards.push(`<div class="card"><h3>Commands</h3><dl class="kv">${rows}</dl></div>`);
        }
      }

      cards.push(`
        <div class="card">
          <h3>Artifacts</h3>
          <dl class="kv">
            <dt>Plans</dt><dd>${state.plans.length} file(s)</dd>
            <dt>Specs</dt><dd>${state.specs.length} file(s)</dd>
            <dt>Packets</dt><dd>${state.packets.length} template(s)</dd>
            <dt>Memory entries</dt><dd>${countMemoryEntries(state.memory)}</dd>
          </dl>
        </div>
      `);

      document.getElementById('p-overview').innerHTML = cards.join('');
    }

    function renderModels() {
      const m = state.models || {};
      document.getElementById('p-models').innerHTML = `
        <div class="card">
          <h3>Raw <code>.ai/models.yaml</code></h3>
          <pre><code>${escapeHtml(jsyaml.dump(m, { lineWidth: 100 }))}</code></pre>
        </div>
      `;
    }

    async function renderFileList(panelEl, dir, files) {
      if (files.length === 0) {
        panelEl.innerHTML = `<div class="empty">No files in <code>${escapeHtml(dir)}</code>.</div>`;
        return;
      }
      const items = await Promise.all(files.map(async f => {
        let md = '';
        try { md = await fetchText(dir + '/' + f); }
        catch (e) { return `<li><div class="name">${escapeHtml(f)}</div><div class="stats">failed to load: ${escapeHtml(e.message)}</div></li>`; }
        const { total, done } = parseCheckboxes(md);
        const heading = firstHeading(md) || f;
        const pct = total ? Math.round(100 * done / total) : null;
        const lineCount = md.split(/\r?\n/).length;
        return `
          <li>
            <div class="name">${escapeHtml(heading)}</div>
            <div class="stats">${escapeHtml(f)} · ${lineCount} lines${total ? ` · ${done}/${total} steps` : ''}${pct !== null ? ` · ${pct}%` : ''}</div>
            ${pct !== null ? `<div class="progress"><div class="progress-bar" style="width:${pct}%"></div></div>` : ''}
            <details>
              <summary>show content</summary>
              <div class="markdown" style="margin-top:10px">${marked.parse(md)}</div>
            </details>
          </li>
        `;
      }));
      panelEl.innerHTML = `<div class="card"><ul class="file-list">${items.join('')}</ul></div>`;
    }

    function renderMarkdown(id, md) {
      document.getElementById(id).innerHTML =
        `<div class="card markdown">${marked.parse(md || '_(empty)_')}</div>`;
    }

    function showError(msg) {
      document.getElementById('p-overview').insertAdjacentHTML('afterbegin', `
        <div class="error-box">
          <strong>Failed to load workflow files</strong><br>${escapeHtml(msg)}<br><br>
          This dashboard needs to be served over HTTP (not opened as <code>file://</code>).<br><br>
          From the repo root, run one of:<br>
          <code>python -m http.server 8000</code><br>
          <code>npx http-server -p 8000</code><br><br>
          Then open <code>http://localhost:8000/dashboard.html</code>.
        </div>
      `);
    }

    async function loadAll() {
      try {
        marked.setOptions({ gfm: true, breaks: false });

        const [projYaml, modelsYaml, memory, decisions] = await Promise.all([
          fetchText('.ai/project.yaml'),
          fetchText('.ai/models.yaml'),
          fetchText('.ai/memory.md').catch(() => ''),
          fetchText('.ai/decisions.md').catch(() => ''),
        ]);
        state.project = jsyaml.load(projYaml) || {};
        state.models = jsyaml.load(modelsYaml) || {};
        state.memory = memory;
        state.decisions = decisions;
        state.plans = await listDir('.ai/plans/');
        state.specs = await listDir('.ai/specs/');
        state.packets = await listDir('.ai/packets/');

        document.getElementById('proj-name').textContent = state.project.project_name || 'unknown';
        document.getElementById('proj-type').textContent = state.project.project_type || '—';
        document.getElementById('c-plans').textContent = state.plans.length;
        document.getElementById('c-specs').textContent = state.specs.length;
        document.getElementById('c-packets').textContent = state.packets.length;
        document.getElementById('c-models').textContent =
          ['plan','execute','review','rescue','maintenance','bootstrap'].filter(k => state.models[k]).length;
        document.getElementById('c-memory').textContent = countMemoryEntries(state.memory);
        document.getElementById('c-decisions').textContent =
          (state.decisions.match(/^-[ \t]*Date:[ \t]*\S/gm) || []).length;
        document.getElementById('updated').textContent =
          'updated ' + new Date().toLocaleTimeString();

        renderOverview();
        renderModels();
        renderMarkdown('p-memory', state.memory);
        renderMarkdown('p-decisions', state.decisions);
        await renderFileList(document.getElementById('p-plans'), '.ai/plans', state.plans);
        await renderFileList(document.getElementById('p-specs'), '.ai/specs', state.specs);
        await renderFileList(document.getElementById('p-packets'), '.ai/packets', state.packets);
      } catch (e) {
        showError(e.message);
      }
    }

    loadAll();
  </script>
</body>
</html>
